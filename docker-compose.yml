services:
  app:
    build:
      context: .
      args:
        # UID/GID du user runtime — repris depuis l'env de l'hôte si dispo,
        # sinon fallback 1000/1000 (typique ubuntu cloud). deploy.sh exporte
        # automatiquement APP_UID/APP_GID via id -u / id -g pour matcher
        # l'utilisateur qui possède le bind-mount data/.
        UID: "${APP_UID:-1000}"
        GID: "${APP_GID:-1000}"
    container_name: revise-ton-dnb
    env_file: .env
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
      # Contenu pédagogique (PDF annales, programme, méthodo, sujets JSON).
      # Monté en RW parce que scripts/generate_variations.py écrit dans
      # content/histoire-geo-emc/subjects/variations/ via `docker compose run`.
      - ./content:/app/content
    restart: unless-stopped
    networks:
      - ecosystem-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ecosystem-network"
      - "traefik.http.routers.revise-ton-dnb.rule=Host(`revise-ton-brevet.matge.com`)"
      - "traefik.http.routers.revise-ton-dnb.entrypoints=websecure"
      - "traefik.http.routers.revise-ton-dnb.tls=true"
      - "traefik.http.routers.revise-ton-dnb.tls.certresolver=letsencrypt"
      - "traefik.http.routers.revise-ton-dnb.tls.options=anssi-strict@file"
      - "traefik.http.routers.revise-ton-dnb.middlewares=security-headers@file"
      - "traefik.http.services.revise-ton-dnb.loadbalancer.server.port=8000"

networks:
  ecosystem-network:
    external: true
