<div class="relative bg-white rounded-2xl border border-brand-200 shadow-glow p-6 animate-reveal overflow-hidden">
  <div class="absolute -top-16 -right-16 h-40 w-40 rounded-full bg-gradient-to-br from-brand-200 to-purple-200 opacity-50"></div>
  <div class="relative">
    <div class="flex items-center gap-3 mb-4">
      <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-600 text-white flex items-center justify-center text-lg shadow-glow">🦉</div>
      <div>
        <div class="text-[11px] uppercase tracking-wider text-brand-600 font-semibold">Albert</div>
        <h2 class="font-display text-xl font-bold text-slate-900">{{ title }}</h2>
      </div>
    </div>
    <div class="eval-md text-slate-800 text-[15px]">{{ content|eval_md }}</div>
    <div class="mt-6 pt-5 border-t border-slate-100 flex justify-end">
      <a href="{{ next_url }}" class="btn-primary hover:wiggle">
        {{ next_label }}
        <span>→</span>
      </a>
    </div>
  </div>
</div>
<script>
  setTimeout(() => {
    const el = document.currentScript && document.currentScript.previousElementSibling;
    if (el && el.scrollIntoView) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
</script>
